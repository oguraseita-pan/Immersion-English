<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Shadow — シャドーイング練習</title>
<style>
  :root{
    --bg:#0e1411;
    --bg2:#121b16;
    --card:#172219;
    --card2:#1d2a20;
    --line:#2a3a2e;
    --ink:#e8efe9;
    --ink-dim:#9bb0a2;
    --ink-faint:#6c8273;
    --leaf:#6fc28b;          /* primary accent (sprout) */
    --leaf-deep:#4fa873;
    --honey:#e8b964;         /* secondary, used only for repeat dots */
    --danger:#d77a72;
    --radius:16px;
    --radius-sm:11px;
    --jp:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--jp)}
  body{
    min-height:100dvh;
    background:
      radial-gradient(120% 60% at 80% -10%, rgba(111,194,139,.10), transparent 60%),
      radial-gradient(90% 50% at -10% 10%, rgba(232,185,100,.05), transparent 55%),
      var(--bg);
    padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 24px);
  }
  .wrap{max-width:560px;margin:0 auto;padding:20px 16px 40px}

  /* ---- header ---- */
  header{display:flex;align-items:baseline;gap:10px;margin:6px 2px 18px}
  .logo{font-size:21px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
  .leaf-mark{width:9px;height:9px;border-radius:0 60% 60% 60%;background:var(--leaf);
    transform:rotate(45deg);box-shadow:0 0 12px rgba(111,194,139,.6)}
  .tagline{color:var(--ink-faint);font-size:12px;font-weight:600}

  /* ---- search ---- */
  .search{display:flex;gap:8px;margin-bottom:14px}
  .search input{
    flex:1;min-width:0;background:var(--card);border:1px solid var(--line);color:var(--ink);
    border-radius:var(--radius-sm);padding:13px 15px;font-size:16px;font-family:var(--jp);outline:none;
    transition:border-color .15s}
  .search input:focus{border-color:var(--leaf-deep)}
  .search input::placeholder{color:var(--ink-faint)}
  .btn{
    border:none;border-radius:var(--radius-sm);font-family:var(--jp);font-weight:700;
    cursor:pointer;transition:transform .08s,filter .15s;font-size:15px}
  .btn:active{transform:scale(.96)}
  .btn-go{background:var(--leaf);color:#0c1510;padding:0 20px;white-space:nowrap}
  .btn-go:hover{filter:brightness(1.06)}

  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
  select.mini{
    background:var(--card);border:1px solid var(--line);color:var(--ink-dim);
    border-radius:9px;padding:8px 11px;font-size:13px;font-family:var(--jp);font-weight:600;outline:none}

  /* ---- player card ---- */
  .stage{
    background:linear-gradient(180deg,var(--card),var(--bg2));
    border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
    box-shadow:0 18px 40px -24px rgba(0,0,0,.8)}
  #yg{width:100%;min-height:248px;background:#000;display:block}
  #yg div, #yg iframe, #yg a{max-width:100%}

  /* progress strip (the signature element) */
  .meter{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px;gap:14px}
  .clipnum{display:flex;align-items:baseline;gap:6px;font-weight:800}
  .clipnum b{font-size:30px;line-height:1;font-variant-numeric:tabular-nums;color:var(--leaf)}
  .clipnum span{font-size:14px;color:var(--ink-faint);font-variant-numeric:tabular-nums}
  .clipnum .lab{font-size:11px;font-weight:700;color:var(--ink-faint);
    letter-spacing:.08em;text-transform:uppercase;margin-left:2px}
  .dots{display:flex;gap:7px;align-items:center}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:background .2s,transform .2s}
  .dot.on{background:var(--honey);transform:scale(1.15);box-shadow:0 0 10px rgba(232,185,100,.5)}
  .dots .dlab{font-size:11px;font-weight:700;color:var(--ink-faint);
    letter-spacing:.08em;text-transform:uppercase;margin-right:4px}

  /* caption */
  .cap{
    margin:6px 16px 4px;min-height:54px;padding:12px 14px;border-radius:12px;
    background:rgba(0,0,0,.22);font-size:17px;line-height:1.55;color:var(--ink);font-weight:500}
  .cap mark{background:transparent;color:var(--honey);font-weight:800;
    border-bottom:2px solid rgba(232,185,100,.5);padding-bottom:1px}
  .cap.off{color:var(--ink-faint);font-weight:600;font-style:normal}
  .status{margin:0 16px 8px;font-size:12.5px;color:var(--ink-faint);font-weight:600;min-height:16px}

  /* transport */
  .transport{display:flex;gap:8px;padding:8px 14px 16px}
  .tbtn{
    flex:1;background:var(--card2);border:1px solid var(--line);color:var(--ink);
    padding:13px 0;border-radius:12px;font-size:18px}
  .tbtn:hover{border-color:var(--leaf-deep)}
  .tbtn.primary{background:var(--leaf);color:#0c1510;border-color:transparent;flex:1.4;font-weight:800}
  .tbtn small{display:block;font-size:10px;font-weight:700;margin-top:2px;opacity:.7}

  /* settings */
  .settings{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0 6px}
  .set{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 13px}
  .set .k{font-size:11px;font-weight:700;color:var(--ink-faint);letter-spacing:.04em;margin-bottom:9px}
  .seg{display:flex;gap:5px}
  .seg button{
    flex:1;background:transparent;border:1px solid var(--line);color:var(--ink-dim);
    padding:7px 0;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--jp);
    transition:.12s}
  .seg button.sel{background:var(--leaf);color:#0c1510;border-color:transparent}
  .toggle{display:flex;align-items:center;justify-content:space-between;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:13px 14px;font-size:13.5px;font-weight:600;color:var(--ink-dim);cursor:pointer}
  .toggles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
  .sw{width:40px;height:23px;border-radius:20px;background:var(--line);position:relative;flex:none;transition:.15s}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;
    background:var(--ink);transition:.15s}
  .toggle.on .sw{background:var(--leaf-deep)}
  .toggle.on .sw::after{left:19px;background:#0c1510}

  /* saved list */
  .save-head{display:flex;align-items:center;justify-content:space-between;margin:26px 4px 10px}
  .save-head h2{font-size:14px;font-weight:800;letter-spacing:.02em;margin:0;color:var(--ink)}
  .save-head .count{font-size:12px;color:var(--ink-faint);font-weight:700}
  .saved{display:flex;flex-direction:column;gap:8px}
  .item{
    display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:13px 14px;cursor:pointer;transition:border-color .12s,transform .08s}
  .item:hover{border-color:var(--leaf-deep)}
  .item:active{transform:scale(.99)}
  .item .ph{flex:1;font-size:15px;font-weight:600;color:var(--ink);overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap}
  .item .acc{font-size:10px;font-weight:800;color:var(--ink-faint);letter-spacing:.08em;
    border:1px solid var(--line);border-radius:6px;padding:3px 6px}
  .item .del{background:none;border:none;color:var(--ink-faint);font-size:17px;cursor:pointer;padding:2px 4px}
  .item .del:hover{color:var(--danger)}
  .empty{text-align:center;color:var(--ink-faint);font-size:13px;padding:22px 0;line-height:1.7}

  .save-btn{
    width:100%;margin-top:14px;background:transparent;border:1px dashed var(--leaf-deep);
    color:var(--leaf);padding:13px;border-radius:var(--radius-sm);font-weight:800;font-size:14px;
    cursor:pointer;font-family:var(--jp);transition:.12s}
  .save-btn:hover{background:rgba(111,194,139,.08)}
  .save-btn:disabled{opacity:.35;cursor:default;border-style:solid}

  footer{text-align:center;margin-top:30px;color:var(--ink-faint);font-size:11px;font-weight:600}
  footer a{color:var(--ink-faint)}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo"><span class="leaf-mark"></span>Shadow</div>
    <div class="tagline">listen · loop · copy</div>
  </header>

  <div class="search">
    <input id="q" type="text" placeholder="フレーズを入力（例: as far as I know）" autocomplete="off" spellcheck="false">
    <button class="btn btn-go" id="goBtn">検索</button>
  </div>

  <div class="row">
    <select class="mini" id="accent">
      <option value="us">🇺🇸 アメリカ</option>
      <option value="uk">🇬🇧 イギリス</option>
      <option value="aus">🇦🇺 オーストラリア</option>
      <option value="ca">🇨🇦 カナダ</option>
      <option value="">アクセント指定なし</option>
    </select>
  </div>

  <div class="stage">
    <div id="yg"></div>

    <div class="meter">
      <div class="clipnum"><b id="clipCur">0</b><span id="clipTot">/ 0</span><span class="lab">clip</span></div>
      <div class="dots"><span class="dlab">repeat</span><span id="dots"></span></div>
    </div>

    <div class="cap" id="cap">フレーズを検索すると、ネイティブが実際に使っている動画が次々に再生されます。</div>
    <div class="status" id="status"></div>

    <div class="transport">
      <button class="tbtn" id="prevBtn" title="前のクリップ">⏮</button>
      <button class="tbtn primary" id="playBtn">⏯<small>再生 / 停止</small></button>
      <button class="tbtn" id="replayBtn" title="もう一度">↻</button>
      <button class="tbtn" id="nextBtn" title="次のクリップ">⏭</button>
    </div>
  </div>

  <div class="settings">
    <div class="set">
      <div class="k">リピート回数（シャドーイング）</div>
      <div class="seg" id="loopSeg"></div>
    </div>
    <div class="set">
      <div class="k">クリップ数</div>
      <div class="seg" id="clipSeg"></div>
    </div>
    <div class="set">
      <div class="k">再生スピード</div>
      <div class="seg" id="spdSeg"></div>
    </div>
    <div class="set">
      <div class="k">アクセント早替え</div>
      <div class="seg" id="quickAcc">
        <button data-a="us" class="sel">US</button>
        <button data-a="uk">UK</button>
        <button data-a="aus">AU</button>
      </div>
    </div>
  </div>

  <div class="toggles">
    <div class="toggle on" id="capToggle"><span>字幕を表示</span><span class="sw"></span></div>
    <div class="toggle on" id="autoToggle"><span>自動で次へ</span><span class="sw"></span></div>
  </div>

  <button class="save-btn" id="saveBtn" disabled>★ このフレーズを保存</button>

  <div class="save-head">
    <h2>保存したフレーズ</h2>
    <span class="count" id="savedCount">0</span>
  </div>
  <div class="saved" id="savedList"></div>

  <footer>
    Powered by <a href="https://youglish.com" target="_blank" rel="noopener">YouGlish</a> ·
    <a href="https://www.youtube.com/t/terms" target="_blank" rel="noopener">YouTube ToS</a>
  </footer>
</div>

<script>
/* ---------------- state ---------------- */
var widget=null, ygReady=false, pending=null;
var total=0, clipCount=0, plays=0, isPlaying=false, currentPhrase="", currentAccent="us";

var S = loadSettings();   // {loops, clips, speed, captionOn, autoAdvance}

/* ---------------- elements ---------------- */
var $=function(id){return document.getElementById(id)};
var qEl=$("q"), capEl=$("cap"), statusEl=$("status"), accentEl=$("accent");

/* ---------------- YouGlish widget ---------------- */
(function loadYG(){
  var t=document.createElement("script");
  t.src="https://youglish.com/public/emb/widget.js";
  document.head.appendChild(t);
})();

window.onYouglishAPIReady=function(){
  // components:0 = bare player only. We render our own caption + controls.
  // (If captions ever fail to fire, change 0 -> 8 to show YouGlish's own caption.)
  widget=new YG.Widget("yg",{
    components:0,
    autoStart:1,
    events:{
      onFetchDone:onFetchDone,
      onVideoChange:onVideoChange,
      onCaptionChange:onCaptionChange,
      onCaptionConsumed:onCaptionConsumed,
      onPlayerStateChange:onPlayerState,
      onPlayerReady:function(){ applySpeed(); },
      onError:onError
    }
  });
  ygReady=true;
  if(pending){ runSearch(pending.q, pending.a); pending=null; }
};

function onFetchDone(e){
  total=e.totalResult||0;
  clipCount=0; plays=0;
  if(!total){ setStatus("「"+currentPhrase+"」の動画が見つかりませんでした。別の言い回しを試してください。"); }
  else { setStatus(currentPhrase+" — "+Math.min(S.clips,total)+"クリップを再生します"); }
  updateMeter();
}
function onVideoChange(e){
  clipCount++; plays=0;
  updateMeter();
}
function onCaptionChange(e){ renderCaption(e.caption); }
function onCaptionConsumed(e){
  if(!S.autoAdvance) return;
  plays++;
  updateDots();
  if(plays < S.loops){
    widget.replay();
  }else{
    if(clipCount < Math.min(S.clips, total)){
      widget.next();
    }else{
      widget.pause();
      setStatus("完了！　↻ でもう一度／⏭ で続けて練習");
    }
  }
}
function onPlayerState(e){
  isPlaying = (e.state===YG.PlayerState.PLAYING);
}
function onError(e){ setStatus("再生エラーが発生しました（コード "+e.code+"）。次のクリップに進んでください。"); }

/* ---------------- search ---------------- */
function search(){
  var q=qEl.value.trim();
  if(!q) return;
  currentPhrase=q; currentAccent=accentEl.value;
  $("saveBtn").disabled=false;
  if(!ygReady){ pending={q:q,a:currentAccent}; setStatus("プレーヤーを読み込み中…"); return; }
  runSearch(q,currentAccent);
}
function runSearch(q,a){
  capEl.classList.remove("off");
  capEl.textContent="読み込み中…";
  if(a){ widget.fetch(q,"english",a); } else { widget.fetch(q,"english"); }
}

/* ---------------- rendering ---------------- */
function renderCaption(text){
  if(!S.captionOn){ capEl.classList.add("off"); capEl.textContent="（字幕オフ：耳だけで真似してみよう）"; return; }
  capEl.classList.remove("off");
  var safe=text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  safe=safe.replace(/\[\[\[/g,"<mark>").replace(/\]\]\]/g,"</mark>");
  capEl.innerHTML=safe;
}
function setStatus(t){ statusEl.textContent=t; }
function updateMeter(){
  $("clipCur").textContent = total? Math.max(1,Math.min(clipCount, S.clips)) : 0;
  $("clipTot").textContent = "/ " + (total? Math.min(S.clips,total) : 0);
  updateDots();
}
function updateDots(){
  var box=$("dots"); box.innerHTML="";
  for(var i=0;i<S.loops;i++){
    var d=document.createElement("span");
    d.className="dot"+(i<plays?" on":"");
    box.appendChild(d);
  }
}

/* ---------------- transport ---------------- */
$("goBtn").onclick=search;
qEl.addEventListener("keydown",function(e){ if(e.key==="Enter") search(); });
$("playBtn").onclick=function(){ if(!widget)return; if(isPlaying) widget.pause(); else widget.play(); };
$("replayBtn").onclick=function(){ if(widget){ plays=0; updateDots(); widget.replay(); } };
$("nextBtn").onclick=function(){ if(widget){ widget.next(); } };
$("prevBtn").onclick=function(){ if(widget){ widget.previous(); } };

/* ---------------- settings UI ---------------- */
function buildSeg(id, values, current, fmt, onPick){
  var box=$(id); box.innerHTML="";
  values.forEach(function(v){
    var b=document.createElement("button");
    b.textContent=fmt(v);
    if(v===current) b.classList.add("sel");
    b.onclick=function(){
      box.querySelectorAll("button").forEach(function(x){x.classList.remove("sel")});
      b.classList.add("sel"); onPick(v);
    };
    box.appendChild(b);
  });
}
buildSeg("loopSeg",[1,2,3,4,5],S.loops,function(v){return v+"回"},function(v){S.loops=v;saveSettings();updateMeter();});
buildSeg("clipSeg",[8,10,12],S.clips,function(v){return v+"個"},function(v){S.clips=v;saveSettings();updateMeter();});
buildSeg("spdSeg",[0.5,0.75,1],S.speed,function(v){return v+"×"},function(v){S.speed=v;saveSettings();applySpeed();});
function applySpeed(){ if(widget&&widget.setSpeed) widget.setSpeed(S.speed); }

/* quick accent */
$("quickAcc").querySelectorAll("button").forEach(function(b){
  if(b.dataset.a===S.lastAccent) { $("quickAcc").querySelectorAll("button").forEach(function(x){x.classList.remove("sel")}); b.classList.add("sel"); }
  b.onclick=function(){
    $("quickAcc").querySelectorAll("button").forEach(function(x){x.classList.remove("sel")});
    b.classList.add("sel");
    accentEl.value=b.dataset.a; S.lastAccent=b.dataset.a; saveSettings();
    if(currentPhrase){ currentAccent=b.dataset.a; runSearch(currentPhrase,currentAccent); }
  };
});
accentEl.value=S.lastAccent||"us";

/* toggles */
function bindToggle(id,key,after){
  var el=$(id);
  if(!S[key]) el.classList.remove("on");
  el.onclick=function(){
    S[key]=!S[key]; el.classList.toggle("on",S[key]); saveSettings(); if(after) after();
  };
}
bindToggle("capToggle","captionOn",function(){ if(!S.captionOn){capEl.classList.add("off");capEl.textContent="（字幕オフ：耳だけで真似してみよう）";} });
bindToggle("autoToggle","autoAdvance");

/* ---------------- saved phrases ---------------- */
$("saveBtn").onclick=function(){
  if(!currentPhrase) return;
  var list=loadSaved();
  if(list.some(function(x){return x.phrase===currentPhrase && x.accent===currentAccent})){
    setStatus("すでに保存済みです"); return;
  }
  list.unshift({phrase:currentPhrase,accent:currentAccent,ts:Date.now()});
  saveSaved(list); renderSaved();
  setStatus("「"+currentPhrase+"」を保存しました");
};
function renderSaved(){
  var list=loadSaved(), box=$("savedList");
  $("savedCount").textContent=list.length;
  box.innerHTML="";
  if(!list.length){ box.innerHTML='<div class="empty">まだ保存はありません。<br>練習したいフレーズを検索して ★ で保存しましょう。</div>'; return; }
  list.forEach(function(it,idx){
    var row=document.createElement("div"); row.className="item";
    var accLabel=(it.accent||"–").toUpperCase();
    row.innerHTML='<span class="ph"></span><span class="acc">'+accLabel+'</span><button class="del" title="削除">✕</button>';
    row.querySelector(".ph").textContent=it.phrase;
    row.querySelector(".ph").onclick=row.querySelector(".acc").onclick=function(){
      qEl.value=it.phrase; accentEl.value=it.accent||"us"; search();
      window.scrollTo({top:0,behavior:"smooth"});
    };
    row.querySelector(".del").onclick=function(ev){
      ev.stopPropagation();
      var l=loadSaved(); l.splice(idx,1); saveSaved(l); renderSaved();
    };
    box.appendChild(row);
  });
}

/* ---------------- storage ---------------- */
function loadSettings(){
  try{ var s=JSON.parse(localStorage.getItem("shadow_settings")||"{}");
    return {loops:s.loops||3, clips:s.clips||10, speed:s.speed||0.75,
            captionOn:s.captionOn!==false, autoAdvance:s.autoAdvance!==false,
            lastAccent:s.lastAccent||"us"};
  }catch(e){ return {loops:3,clips:10,speed:0.75,captionOn:true,autoAdvance:true,lastAccent:"us"}; }
}
function saveSettings(){ try{ localStorage.setItem("shadow_settings",JSON.stringify(S)); }catch(e){} }
function loadSaved(){ try{ return JSON.parse(localStorage.getItem("shadow_saved")||"[]"); }catch(e){ return []; } }
function saveSaved(l){ try{ localStorage.setItem("shadow_saved",JSON.stringify(l)); }catch(e){} }

/* init */
renderSaved();
updateMeter();
</script>
</body>
</html>
